name: Chroma
options:
  bundleIdPrefix: it.mtre-consulting
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_PREVIEWS: YES

targets:
  Chroma:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Chroma
    info:
      path: Chroma/Resources/Info.plist
      properties:
        CFBundleName: Chroma
        CFBundleDisplayName: Chroma
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: it.mtre-consulting.chroma
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  ChromaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ChromaTests
    dependencies:
      - target: Chroma
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: it.mtre-consulting.chromaTests
