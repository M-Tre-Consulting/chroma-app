name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > /tmp/release.keystore
            echo "ANDROID_KEYSTORE_PATH=/tmp/release.keystore" >> "$GITHUB_ENV"
          fi

      - name: Build release APK
        working-directory: apps/android
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: apps/android/app/build/outputs/apk/release/*.apk

  tauri-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (macOS)
        working-directory: apps/desktop
        run: pnpm tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows)
        working-directory: apps/desktop
        run: pnpm tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [android, tauri-macos, tauri-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
