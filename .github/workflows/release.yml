name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Install JetBrains JDK 21
        run: |
          url=$(curl -s "https://api.foojay.io/disco/v3.0/packages?jdk_version=21&distribution=jetbrains&architecture=x64&operating_system=linux&package_type=jdk&release_status=ga&latest=per_distro" | \
            jq -r '.result[0].links.pkg_download_redirect // empty')
          [ -n "$url" ] || { echo "JBR 21 not found"; exit 1; }
          curl -sL "$url" -o /tmp/jbr.tar.gz
          mkdir -p "$HOME/.jbr"
          tar -xzf /tmp/jbr.tar.gz -C "$HOME/.jbr" --strip-components=1
          echo "JAVA_HOME=$HOME/.jbr" >> "$GITHUB_ENV"
          echo "$HOME/.jbr/bin" >> "$GITHUB_PATH"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          IFS='.' read -r major minor patch <<< "$VERSION"
          echo "VERSION_CODE=$(( major * 10000 + minor * 100 + patch ))" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: apps/android
        run: gradle assembleRelease -PversionName="$VERSION" -PversionCode="$VERSION_CODE"

      - name: Sign APK
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          SIGNING_CERT: ${{ secrets.ANDROID_SIGNING_CERT }}
        run: |
          printf '%s' "$SIGNING_KEY" | base64 --decode > /tmp/signing-key.pem
          printf '%s' "$SIGNING_CERT" | base64 --decode > /tmp/signing-cert.pem
          openssl pkcs8 -topk8 -nocrypt -in /tmp/signing-key.pem -out /tmp/signing-key.pk8 -outform DER
          openssl x509 -in /tmp/signing-cert.pem -out /tmp/signing-cert.der -outform DER
          APKSIGNER=$(find "$ANDROID_SDK_ROOT" -name "apksigner" -not -name "*.bat" | sort -V | tail -1)
          APK=$(find apps/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          "$APKSIGNER" sign --key /tmp/signing-key.pk8 --cert /tmp/signing-cert.der "$APK"

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: apps/android/app/build/outputs/apk/release/*.apk

  tauri-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Add x86_64 macOS target
        run: rustup target add x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: node -e "const fs=require('fs'); fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION=' + process.env.GITHUB_REF_NAME.replace(/^v/,'') + '\n')"

      - name: Inject version into tauri.conf.json
        working-directory: apps/desktop
        run: node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); c.version=process.env.VERSION; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c,null,2)+'\n')"

      - name: Generate icons from iOS source
        working-directory: apps/desktop
        run: pnpm tauri icon ../ios/Chroma/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png

      - name: Build Tauri (macOS universal)
        working-directory: apps/desktop
        run: pnpm tauri build --target universal-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: node -e "const fs=require('fs'); fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION=' + process.env.GITHUB_REF_NAME.replace(/^v/,'') + '\n')"

      - name: Inject version into tauri.conf.json
        working-directory: apps/desktop
        run: node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); c.version=process.env.VERSION; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c,null,2)+'\n')"

      - name: Generate icons from iOS source
        working-directory: apps/desktop
        run: pnpm tauri icon ../ios/Chroma/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png

      - name: Build Tauri (Windows)
        working-directory: apps/desktop
        run: pnpm tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  tauri-windows-arm:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Add ARM64 Windows target
        run: rustup target add aarch64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: node -e "const fs=require('fs'); fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION=' + process.env.GITHUB_REF_NAME.replace(/^v/,'') + '\n')"

      - name: Inject version into tauri.conf.json
        working-directory: apps/desktop
        run: node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); c.version=process.env.VERSION; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c,null,2)+'\n')"

      - name: Generate icons from iOS source
        working-directory: apps/desktop
        run: pnpm tauri icon ../ios/Chroma/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png

      - name: Build Tauri (Windows ARM)
        working-directory: apps/desktop
        run: pnpm tauri build --target aarch64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-arm
          path: apps/desktop/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe

  release:
    needs: [android, tauri-macos, tauri-windows, tauri-windows-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Installation

            **macOS** — Gatekeeper will block the app on first launch since it is not notarized. After dragging Chroma to `/Applications`, run:
            ```bash
            xattr -dr com.apple.quarantine /Applications/Chroma.app
            ```
            Or go to **System Settings → Privacy & Security → Open Anyway** after the first blocked attempt.

            **Android** — Install the APK directly or add this repo to [Obtainium](https://github.com/ImranR98/Obtainium) for automatic updates.

            **Windows** — Windows Defender SmartScreen may warn on first launch. Click **More info → Run anyway**.
