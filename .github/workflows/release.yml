name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Install JetBrains JDK 21
        run: |
          url=$(curl -s "https://api.foojay.io/disco/v3.0/packages?jdk_version=21&distribution=jetbrains&architecture=x64&operating_system=linux&package_type=jdk&release_status=ga&latest=per_distro" | \
            jq -r '.result[0].links.pkg_download_redirect // empty')
          [ -n "$url" ] || { echo "JBR 21 not found"; exit 1; }
          curl -sL "$url" -o /tmp/jbr.tar.gz
          mkdir -p "$HOME/.jbr"
          tar -xzf /tmp/jbr.tar.gz -C "$HOME/.jbr" --strip-components=1
          echo "JAVA_HOME=$HOME/.jbr" >> "$GITHUB_ENV"
          echo "$HOME/.jbr/bin" >> "$GITHUB_PATH"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          IFS='.' read -r major minor patch <<< "$VERSION"
          echo "VERSION_CODE=$(( major * 10000 + minor * 100 + patch ))" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: apps/android
        run: gradle assembleRelease -PversionName="$VERSION" -PversionCode="$VERSION_CODE"

      - name: Sign APK
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          SIGNING_CERT: ${{ secrets.ANDROID_SIGNING_CERT }}
        run: |
          printf '%s' "$SIGNING_KEY" | base64 --decode > /tmp/signing-key.pem
          printf '%s' "$SIGNING_CERT" | base64 --decode > /tmp/signing-cert.pem
          openssl pkcs8 -topk8 -nocrypt -in /tmp/signing-key.pem -out /tmp/signing-key.pk8 -outform DER
          openssl x509 -in /tmp/signing-cert.pem -out /tmp/signing-cert.der -outform DER
          APKSIGNER=$(find "$ANDROID_SDK_ROOT" -name "apksigner" -not -name "*.bat" | sort -V | tail -1)
          APK=$(find apps/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          "$APKSIGNER" sign --key /tmp/signing-key.pk8 --cert /tmp/signing-cert.der "$APK"

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: apps/android/app/build/outputs/apk/release/*.apk

  desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Windows Port (Self-Contained Single-File Compressed x64)
        run: dotnet publish apps/desktop-windows/Chroma.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/

      - name: Build Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: apps/desktop-windows/installer.iss

      - name: Compress Portable Build
        run: Compress-Archive -Path publish/Chroma.exe,publish/Chroma.pdb -DestinationPath Chroma-Windows-x64.zip

      - name: Stage Windows Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows_artifacts
          Copy-Item -Path Chroma-Windows-x64.zip -Destination windows_artifacts/
          Copy-Item -Path publish_installer/ChromaSetup.exe -Destination windows_artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: windows_artifacts/

  desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libjsoncpp-dev uuid-dev

      - name: Configure CMake
        run: cmake -B apps/desktop-linux/build -S apps/desktop-linux -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build apps/desktop-linux/build

      - name: Package AppImage
        run: |
          mkdir -p Chroma.AppDir/usr/bin
          cp apps/desktop-linux/build/desktop-linux Chroma.AppDir/usr/bin/
          cp apps/desktop-windows/ic_launcher.png Chroma.AppDir/chroma.png
          mkdir -p Chroma.AppDir/usr/share/icons/hicolor/256x256/apps
          cp apps/desktop-windows/ic_launcher.png Chroma.AppDir/usr/share/icons/hicolor/256x256/apps/chroma.png
          
          cat << 'EOF' > Chroma.AppDir/chroma.desktop
          [Desktop Entry]
          Name=Chroma
          Exec=desktop-linux
          Icon=chroma
          Type=Application
          Categories=Development;Graphics;
          Comment=Color palette and design token manager
          EOF
          
          cat << 'EOF' > Chroma.AppDir/AppRun
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=$(dirname "$SELF")
          exec "$HERE/usr/bin/desktop-linux" "$@"
          EOF
          chmod +x Chroma.AppDir/AppRun
          
          curl -Lfo appimagetool-x86_64.AppImage https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run Chroma.AppDir Chroma-Linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: Chroma-Linux-x86_64.AppImage

  release:
    needs: [android, desktop-windows, desktop-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Installation

            **Windows** — Download and run `ChromaSetup.exe` to install the app, or download the portable `Chroma-Windows-x64.zip` and run it directly.

            **Linux** — Download the `Chroma-Linux-x86_64.AppImage` executable and run it directly (make sure to set executable permissions: `chmod +x Chroma-Linux-x86_64.AppImage`).

            **Android** — Install the APK directly or add this repo to [Obtainium](https://github.com/ImranR98/Obtainium) for automatic updates.

