name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Install JetBrains JDK 21
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url=$(curl -sH "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/JetBrains/JetBrainsRuntime/releases" | \
            jq -r '[.[] | select(.tag_name | startswith("jbr-release-21")) | select(.prerelease == false)][0].assets[] | select(.name | test("^jbr-21\\.[0-9.]+-linux-x64-b[0-9.]+\\.tar\\.gz$")) | .browser_download_url' | head -1)
          [ -n "$url" ] || { echo "JBR 21 release not found"; exit 1; }
          curl -sL "$url" -o /tmp/jbr.tar.gz
          mkdir -p "$HOME/.jbr"
          tar -xzf /tmp/jbr.tar.gz -C "$HOME/.jbr" --strip-components=1
          echo "JAVA_HOME=$HOME/.jbr" >> "$GITHUB_ENV"
          echo "$HOME/.jbr/bin" >> "$GITHUB_PATH"

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > /tmp/release.keystore
            echo "ANDROID_KEYSTORE_PATH=/tmp/release.keystore" >> "$GITHUB_ENV"
          fi

      - name: Build release APK
        working-directory: apps/android
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: apps/android/app/build/outputs/apk/release/*.apk

  tauri-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (macOS)
        working-directory: apps/desktop
        run: pnpm tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows)
        working-directory: apps/desktop
        run: pnpm tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [android, tauri-macos, tauri-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
