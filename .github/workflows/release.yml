name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Install JetBrains JDK 21
        run: |
          url=$(curl -s "https://api.foojay.io/disco/v3.0/packages?jdk_version=21&distribution=jetbrains&architecture=x64&operating_system=linux&package_type=jdk&release_status=ga&latest=per_distro" | \
            jq -r '.result[0].links.pkg_download_redirect // empty')
          [ -n "$url" ] || { echo "JBR 21 not found"; exit 1; }
          curl -sL "$url" -o /tmp/jbr.tar.gz
          mkdir -p "$HOME/.jbr"
          tar -xzf /tmp/jbr.tar.gz -C "$HOME/.jbr" --strip-components=1
          echo "JAVA_HOME=$HOME/.jbr" >> "$GITHUB_ENV"
          echo "$HOME/.jbr/bin" >> "$GITHUB_PATH"

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > /tmp/release.keystore
            echo "ANDROID_KEYSTORE_PATH=/tmp/release.keystore" >> "$GITHUB_ENV"
          fi

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          IFS='.' read -r major minor patch <<< "$VERSION"
          echo "VERSION_CODE=$(( major * 10000 + minor * 100 + patch ))" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: apps/android
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle assembleRelease -PversionName="$VERSION" -PversionCode="$VERSION_CODE"

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: apps/android/app/build/outputs/apk/release/*.apk

  tauri-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: node -e "const fs=require('fs'); fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION=' + process.env.GITHUB_REF_NAME.replace(/^v/,'') + '\n')"

      - name: Inject version into tauri.conf.json
        working-directory: apps/desktop
        run: node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); c.version=process.env.VERSION; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c,null,2)+'\n')"

      - name: Generate icons from iOS source
        working-directory: apps/desktop
        run: pnpm tauri icon ../ios/Chroma/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png

      - name: Build Tauri (macOS)
        working-directory: apps/desktop
        run: pnpm tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: node -e "const fs=require('fs'); fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION=' + process.env.GITHUB_REF_NAME.replace(/^v/,'') + '\n')"

      - name: Inject version into tauri.conf.json
        working-directory: apps/desktop
        run: node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); c.version=process.env.VERSION; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c,null,2)+'\n')"

      - name: Generate icons from iOS source
        working-directory: apps/desktop
        run: pnpm tauri icon ../ios/Chroma/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png

      - name: Build Tauri (Windows)
        working-directory: apps/desktop
        run: pnpm tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [android, tauri-macos, tauri-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
